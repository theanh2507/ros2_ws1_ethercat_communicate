vendor_id: 0x00000168
product_id: 0x0000001b
assign_activate: 0x0300         # dong bo hoa thoi gian giua master va slave
auto_fault_reset: true

# sdo:
#   - { index: 0x6060, sub_index: 0, type: int8, value: 8 } # Chế độ CSV

# master->slave
rpdo:
  - index: 0x1603     #RPDO Mapping Object chua dia chi cac thanh ghi khac
    channels:
      # - {index: 0x6040, sub_index: 0, type: uint16, command_interface: controlword, default: 0} # 2 byte    control word: dieu khien trang thai cua dong co
      - {index: 0x607a, sub_index: 0, type: int32, command_interface: position, default: .nan} # 4 byte
      - {index: 0x60ff, sub_index: 0, type: int32, command_interface: velocity, default: .nan} # 4 byte
      - {index: 0x6071, sub_index: 0, type: int16} # 2 byte
      # - {index: 0x6060, sub_index: 0, type: int8, command_interface: mode_of_operation, default: .nan}  # 1 byte

# slave->master
tpdo:
  - index: 0x1a03
    channels:
      - {index: 0x6041, sub_index: 0, type: uint16, state_interface: status_word} # 2 byte
      - {index: 0x6064, sub_index: 0, type: int32, state_interface: position} # 4 byte
      - {index: 0x606c, sub_index: 0, type: int32, state_interface: velocity} # 4 byte
      # - {index: 0x6064, sub_index: 0, type: int32, state_interface: position, factor: 0.00062831853} # 4 byte
      # - {index: 0x606c, sub_index: 0, type: int32, state_interface: velocity, factor: 0.00062831853} # 4 byte
      - {index: 0x6077, sub_index: 0, type: int16, state_interface: effort} # 2 byte
      - {index: 0x60FD, sub_index: 0, type: uint32, state_interface: digital_inputs} # 1 byte
      - {index: 0x6061, sub_index: 0, type: int8, state_interface: mode_of_operation} # 1 byte
      - {index: 0x6078, sub_index: 0, type: int16, state_interface: electric_current} # 1 byte
      # - {index: 0x6075, sub_index: 0, type: uint32, state_interface: rated_current} # 1 byte